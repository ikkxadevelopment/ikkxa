name = "ikkxa"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next"

# Cloudflare Pages (Advanced Mode) deployment via @opennextjs/cloudflare.
# Build command (set in the Pages dashboard, same as the development project):
#   npx @opennextjs/cloudflare@1.3.0 build \
#     && cp -r .open-next/assets/. .open-next/ \
#     && npm run cf:patch-worker \
#     && mv .open-next/worker.js .open-next/_worker.js
# Build output directory: .open-next
#
# NEXTAUTH_SECRET and GOOGLE_CLIENT_SECRET are set as encrypted Secrets
# in the Cloudflare dashboard (Settings → Variables and Secrets).
[vars]
NEXTAUTH_URL = "https://www.ikkxa.com"
GOOGLE_CLIENT_ID = "810683566241-p5k1l4j4p4lvhpt7l591u2blg8umhelh.apps.googleusercontent.com"
